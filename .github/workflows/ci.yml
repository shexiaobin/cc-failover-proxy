name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install requests

      - name: Syntax check proxy
        run: python -c "import py_compile; py_compile.compile('proxy.py', doraise=True)"

      - name: Run protocol tests
        run: python scripts/test_proxy_protocol.py

      - name: Shell script lint (bash -n)
        run: |
          for f in run.sh scripts/install.sh scripts/uninstall.sh scripts/status.sh scripts/watchdog.sh; do
            bash -n "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done
